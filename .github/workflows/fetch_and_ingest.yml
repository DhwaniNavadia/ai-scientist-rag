name: Weekly arXiv Fetch & Ingest

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      max_papers:
        description: "Max papers to ingest"
        default: "10"
        required: false

permissions:
  contents: read

jobs:
  fetch-and-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          COLLECTION_NAME: ai_scientist
        run: |
          MAX=${{ github.event.inputs.max_papers || '10' }}
          echo "Ingesting up to $MAX papers …"
          python -m ai_scientist.ingestion.ingest_pipeline --n "$MAX"

      - name: Verify Qdrant collection
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          COLLECTION_NAME: ai_scientist
        run: python -m ai_scientist.ingestion.ingest_pipeline --verify-only
